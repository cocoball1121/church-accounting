<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2744">
<title>은혜 회계 - 교회 재정 관리</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1a2744; --navy2: #243260; --gold: #c9a84c;
  --inc: #2d8a4e; --exp: #c0392b;
  --bg: #f0f2f7; --card: #fff; --text: #1a1a2e;
  --muted: #7a7a9a; --border: #e2e5ef;
  --radius: 14px; --shadow: 0 2px 12px rgba(26,39,68,.10);
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

/* AUTH */
#auth-screen { display:flex; align-items:center; justify-content:center; min-height:100dvh; background:linear-gradient(135deg,var(--navy) 0%,#2c4a8c 100%); }
.auth-box { background:white; border-radius:24px; padding:40px 36px; width:min(400px,92vw); box-shadow:0 20px 60px rgba(0,0,0,.3); }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo .logo-icon { font-size:48px; display:block; margin-bottom:8px; }
.auth-logo h1 { font-size:22px; font-weight:700; color:var(--navy); }
.auth-logo p { font-size:13px; color:var(--muted); margin-top:2px; }
.auth-box input { width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:10px; font-size:15px; font-family:inherit; margin-bottom:12px; outline:none; transition:border-color .2s; }
.auth-box input:focus { border-color:var(--navy); }
.auth-btns { display:flex; gap:10px; margin-top:4px; }
.auth-btn { flex:1; padding:13px; border:none; border-radius:10px; font-size:15px; font-family:inherit; font-weight:600; cursor:pointer; }
.auth-btn.primary { background:var(--navy); color:white; }
.auth-btn.secondary { background:var(--border); color:var(--navy); }
#auth-error { color:var(--exp); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }

/* APP LAYOUT */
#app-screen { display:flex; flex-direction:column; min-height:100dvh; }
.topbar { background:var(--navy); color:white; padding:14px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
.topbar-logo { font-size:20px; font-weight:700; flex:1; }
.topbar-logo span { font-size:13px; font-weight:400; opacity:.7; margin-left:6px; }
.topbar-user { font-size:12px; opacity:.75; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.logout-btn { background:rgba(255,255,255,.15); border:none; color:white; padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap; }
.dept-tabs { background:var(--navy2); display:flex; padding:8px 16px; gap:8px; overflow-x:auto; scrollbar-width:none; }
.dept-tab { background:rgba(255,255,255,.12); border:none; color:rgba(255,255,255,.75); padding:7px 16px; border-radius:20px; font-size:13px; font-family:inherit; font-weight:500; cursor:pointer; white-space:nowrap; transition:all .2s; }
.dept-tab.active { background:white; color:var(--navy); font-weight:700; }
main { flex:1; padding:16px 16px 100px; max-width:700px; width:100%; margin:0 auto; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); display:flex; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:100; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; border:none; background:none; cursor:pointer; font-family:inherit; color:var(--muted); font-size:10px; font-weight:500; padding:4px; transition:color .2s; }
.nav-btn .nav-icon { font-size:22px; }
.nav-btn.active { color:var(--navy); }

/* FAB */
.fab { position:fixed; bottom:76px; right:20px; width:54px; height:54px; background:var(--gold); color:white; border:none; border-radius:50%; font-size:28px; cursor:pointer; box-shadow:0 4px 16px rgba(201,168,76,.45); display:flex; align-items:center; justify-content:center; z-index:101; transition:transform .15s; font-family:inherit; }
.fab:active { transform:scale(.92); }

/* DASHBOARD */
.summary-hero { background:linear-gradient(135deg,var(--navy) 0%,#2c4a8c 100%); color:white; border-radius:var(--radius); padding:24px; margin-bottom:20px; text-align:center; }
.summary-label { font-size:13px; opacity:.75; }
.summary-balance { font-size:34px; font-weight:700; margin:6px 0; letter-spacing:-.5px; }
.summary-balance.neg { color:#ff8a8a; }
.summary-row { display:flex; gap:20px; justify-content:center; margin-top:10px; }
.summary-item { font-size:13px; opacity:.85; }
.dept-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.dept-card { background:white; border-radius:var(--radius); padding:16px; cursor:pointer; border-left:4px solid var(--dept-color); box-shadow:var(--shadow); transition:transform .15s; }
.dept-card:active { transform:scale(.97); }
.dept-card-header { font-size:13px; font-weight:600; color:var(--dept-color); margin-bottom:8px; }
.dept-card-balance { font-size:20px; font-weight:700; margin-bottom:8px; }
.dept-card-row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
.section-title { font-size:14px; font-weight:700; color:var(--navy); margin-bottom:10px; }

/* TX LIST */
.tx-list { background:white; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.tx-row { display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
.tx-row:last-child { border-bottom:none; }
.tx-row:active { background:var(--bg); }
.tx-dept-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.tx-info { flex:1; min-width:0; }
.tx-desc { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.tx-amount { font-size:14px; font-weight:700; white-space:nowrap; }
.tx-del { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px; }
.tx-summary-bar { background:var(--navy); color:white; display:flex; gap:16px; padding:10px 16px; border-radius:var(--radius); margin-bottom:12px; font-size:13px; font-weight:600; }
.more-btn { width:100%; margin-top:10px; padding:11px; background:white; border:2px solid var(--border); border-radius:10px; font-family:inherit; font-size:13px; color:var(--navy); font-weight:600; cursor:pointer; }
.empty { padding:24px; text-align:center; color:var(--muted); font-size:14px; }

/* BUDGET */
.budget-page { display:flex; flex-direction:column; gap:16px; }
.budget-section { background:white; border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); }
.budget-dept-header { font-size:16px; font-weight:700; margin-bottom:12px; }
.budget-total-row { display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:10px; }
.budget-input { border:2px solid var(--border); border-radius:8px; padding:7px 10px; font-size:14px; font-family:inherit; width:130px; outline:none; }
.budget-input:focus { border-color:var(--navy); }
.budget-input.sm { width:100px; }
.budget-bar-wrap { margin-bottom:12px; }
.budget-bar { height:8px; background:var(--border); border-radius:4px; margin-bottom:4px; overflow:hidden; }
.budget-bar::before { content:''; display:block; height:100%; width:var(--pct); background:var(--color); border-radius:4px; transition:width .4s; }
.budget-pct { font-size:12px; color:var(--muted); }
.budget-cat-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.budget-cat-name { border:2px solid var(--border); border-radius:8px; padding:6px 10px; font-size:13px; font-family:inherit; flex:1; outline:none; }
.cat-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; }
.add-cat-btn { background:var(--bg); border:2px dashed var(--border); border-radius:8px; padding:7px 14px; font-size:13px; font-family:inherit; color:var(--muted); cursor:pointer; width:100%; }
.save-budget-btn { background:var(--navy); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-family:inherit; font-weight:700; cursor:pointer; }

/* REPORTS */
.reports-page { display:flex; flex-direction:column; gap:4px; }
.report-header-row { display:grid; grid-template-columns:60px 1fr 1fr 1fr; padding:6px 14px; font-size:12px; color:var(--muted); font-weight:600; }
.report-row { display:grid; grid-template-columns:60px 1fr 1fr 1fr; background:white; padding:11px 14px; border-radius:8px; font-size:13px; box-shadow:var(--shadow); }
.report-row.current-month { border:2px solid var(--navy); }
.report-month { font-weight:700; color:var(--navy); }
.cat-report-row { display:flex; justify-content:space-between; background:white; padding:11px 14px; border-radius:8px; font-size:13px; box-shadow:var(--shadow); }
.print-btn { margin-top:16px; background:var(--navy); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-family:inherit; font-weight:700; cursor:pointer; width:100%; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:flex-end; justify-content:center; z-index:200; }
.modal-overlay.open { display:flex; }
.modal-box { background:white; border-radius:24px 24px 0 0; width:100%; max-width:700px; padding:28px 24px max(28px,env(safe-area-inset-bottom)); max-height:90dvh; overflow-y:auto; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; }
.form-group select, .form-group input[type=text], .form-group input[type=date], .form-group input[type=number] { width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:10px; font-size:15px; font-family:inherit; outline:none; }
.form-group select:focus, .form-group input:focus { border-color:var(--navy); }
.type-toggle { display:flex; gap:8px; }
.type-btn { flex:1; padding:10px; border:2px solid var(--border); border-radius:10px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; background:white; color:var(--muted); transition:all .2s; }
.type-btn.active { border-color:var(--navy); background:var(--navy); color:white; }
.modal-submit { width:100%; margin-top:8px; padding:14px; background:var(--navy); color:white; border:none; border-radius:12px; font-size:16px; font-family:inherit; font-weight:700; cursor:pointer; }
.modal-delete { width:100%; margin-top:12px; padding:12px; background:white; color:var(--exp); border:2px solid var(--exp); border-radius:12px; font-size:14px; font-family:inherit; font-weight:600; cursor:pointer; }
.detail-grid { display:flex; flex-direction:column; }
.detail-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; }
.detail-row span:first-child { color:var(--muted); }
.detail-row .big { font-size:20px; font-weight:700; }

/* UTILS */
.inc { color:var(--inc); } .exp { color:var(--exp); } .bal { font-weight:700; } .neg { color:var(--exp); }
#toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(26,39,68,.95); color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all .25s; z-index:300; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (min-width:700px) {
  .bottom-nav { left:50%; transform:translateX(-50%); max-width:700px; border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; }
  main { padding-bottom:110px; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="logo-icon">✝️</span>
      <h1>은혜 회계</h1>
      <p>교회 재정 관리 시스템</p>
    </div>
    <input type="email" id="login-email" placeholder="이메일 주소" autocomplete="email">
    <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password">
    <div class="auth-btns">
      <button class="auth-btn primary" id="btn-login">로그인</button>
      <button class="auth-btn secondary" id="btn-register">회원가입</button>
    </div>
    <div id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none; flex-direction:column; min-height:100dvh;">
  <header class="topbar">
    <div class="topbar-logo">✝️ 은혜 회계 <span>재정관리</span></div>
    <span class="topbar-user" id="user-email"></span>
    <button class="logout-btn" id="btn-logout">로그아웃</button>
  </header>
  <div class="dept-tabs">
    <button class="dept-tab active" data-dept="all">🏛️ 전체</button>
    <button class="dept-tab" data-dept="student">📚 학생부</button>
    <button class="dept-tab" data-dept="praise">🎵 학생찬양팀</button>
  </div>
  <main><div id="view-content"></div></main>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard"><span class="nav-icon">🏠</span>홈</button>
    <button class="nav-btn" data-view="transactions"><span class="nav-icon">📋</span>거래</button>
    <button class="nav-btn" data-view="budget"><span class="nav-icon">💰</span>예산</button>
    <button class="nav-btn" data-view="reports"><span class="nav-icon">📊</span>결산</button>
  </nav>
  <button class="fab" id="btn-fab">+</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-body"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- SCRIPT: body 끝에 위치 (type=module) -->
<script type="module">
import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, signOut,
         onAuthStateChanged }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc,
         deleteDoc, query, orderBy, onSnapshot,
         setDoc, getDoc, Timestamp }                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Firebase 초기화 ── */
const firebaseConfig = {
  apiKey: "AIzaSyDFYmPKGMAARiWcsHlLFGJLaQXoeLSi8iE",
  authDomain: "church-accounting-fbf26.firebaseapp.com",
  projectId: "church-accounting-fbf26",
  storageBucket: "church-accounting-fbf26.firebasestorage.app",
  messagingSenderId: "731415047963",
  appId: "1:731415047963:web:5ef8db4154e535baa42dbe"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ── 앱 상태 ── */
let currentDept = 'all';
let currentView = 'dashboard';
let transactions = [];
let budgets = {};
let _txType = 'income';
let unsubTx = null;

const DEPTS = {
  student: { label:'학생부',    color:'#4f86f7', icon:'📚' },
  praise:  { label:'학생찬양팀', color:'#f7934f', icon:'🎵' },
};

/* ── Auth ── */
onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    document.getElementById('user-email').textContent    = user.email;
    await loadBudgets();
    subscribeTx();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
    if (unsubTx) { unsubTx(); unsubTx = null; }
  }
});

/* ── Firestore ── */
function subscribeTx() {
  if (unsubTx) unsubTx();
  const q = query(collection(db, 'transactions'), orderBy('date', 'desc'));
  unsubTx = onSnapshot(q, snap => {
    transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

async function loadBudgets() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'budgets'));
    if (snap.exists()) budgets = snap.data();
  } catch(e) {}
}

async function addTx(data) {
  data.date = Timestamp.fromDate(new Date(data.date));
  data.createdAt = Timestamp.now();
  await addDoc(collection(db, 'transactions'), data);
}

async function deleteTx(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await deleteDoc(doc(db, 'transactions', id));
  hideModal();
}

async function saveBudgets(data) {
  await setDoc(doc(db, 'settings', 'budgets'), data);
  budgets = data;
  renderAll();
  showToast('예산이 저장되었습니다 ✓');
}

/* ── 유틸 ── */
const fmt   = n => Number(n||0).toLocaleString('ko-KR') + '원';
const fmtD  = ts => { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}); };
const fmtDF = ts => { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}); };
const getFiltered = () => currentDept==='all' ? transactions : transactions.filter(t=>t.dept===currentDept);
const calcSummary = list => {
  const income  = list.filter(t=>t.type==='income' ).reduce((s,t)=>s+(t.amount||0),0);
  const expense = list.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
  return { income, expense, balance: income-expense };
};

/* ── 렌더 ── */
function renderAll() {
  document.querySelectorAll('.dept-tab').forEach(el => el.classList.toggle('active', el.dataset.dept===currentDept));
  document.querySelectorAll('.nav-btn') .forEach(el => el.classList.toggle('active', el.dataset.view===currentView));
  const views = { dashboard:renderDashboard, transactions:renderTransactions, budget:renderBudget, reports:renderReports };
  (views[currentView] || renderDashboard)();
}

function renderDashboard() {
  const filtered = getFiltered();
  const s = calcSummary(filtered);
  let deptCards = '';
  for (const [k,v] of Object.entries(DEPTS)) {
    const ds = calcSummary(transactions.filter(t=>t.dept===k));
    deptCards += `<div class="dept-card" style="--dept-color:${v.color}" data-action="switchdept" data-dept="${k}">
      <div class="dept-card-header">${v.icon} ${v.label}</div>
      <div class="dept-card-balance">${fmt(ds.balance)}</div>
      <div class="dept-card-row"><span>수입</span><span class="inc">+${fmt(ds.income)}</span></div>
      <div class="dept-card-row"><span>지출</span><span class="exp">-${fmt(ds.expense)}</span></div>
    </div>`;
  }
  const recent = filtered.slice(0,5);
  document.getElementById('view-content').innerHTML = `
    <div class="summary-hero">
      <div class="summary-label">${currentDept==='all'?'전체 잔액':(DEPTS[currentDept]?.label+' 잔액')}</div>
      <div class="summary-balance ${s.balance<0?'neg':''}">${fmt(s.balance)}</div>
      <div class="summary-row">
        <div class="summary-item inc">↑ 수입 ${fmt(s.income)}</div>
        <div class="summary-item exp">↓ 지출 ${fmt(s.expense)}</div>
      </div>
    </div>
    ${currentDept==='all'?`<div class="section-title">부서별 현황</div><div class="dept-cards">${deptCards}</div>`:''}
    <div class="section-title">최근 거래</div>
    <div class="tx-list">${recent.length ? recent.map(t=>txHtml(t)).join('') : '<div class="empty">거래내역이 없습니다</div>'}</div>
    ${filtered.length>5?`<button class="more-btn" data-action="moretx">전체 보기 →</button>`:''}`;
}

function renderTransactions() {
  const filtered = getFiltered();
  const s = calcSummary(filtered);
  document.getElementById('view-content').innerHTML = `
    <div class="tx-summary-bar">
      <span class="inc">수입 ${fmt(s.income)}</span>
      <span class="exp">지출 ${fmt(s.expense)}</span>
      <span class="bal">잔액 ${fmt(s.balance)}</span>
    </div>
    <div class="tx-list">${filtered.length ? filtered.map(t=>txHtml(t,true)).join('') : '<div class="empty">거래내역이 없습니다</div>'}</div>`;
}

function txHtml(t, showDel=false) {
  const info=DEPTS[t.dept], isInc=t.type==='income';
  return `<div class="tx-row" data-action="txdetail" data-id="${t.id}">
    <div class="tx-dept-dot" style="background:${info?.color||'#aaa'}"></div>
    <div class="tx-info">
      <div class="tx-desc">${t.description}</div>
      <div class="tx-meta">${fmtD(t.date)} · ${info?.icon||''} ${info?.label||''} · ${t.category||''}</div>
    </div>
    <div class="tx-amount ${isInc?'inc':'exp'}">${isInc?'+':'-'}${fmt(t.amount)}</div>
    ${showDel?`<button class="tx-del" data-action="txdel" data-id="${t.id}">✕</button>`:''}
  </div>`;
}

function renderBudget() {
  let html='';
  for (const [k,v] of Object.entries(DEPTS)) {
    const b=budgets[k]||{}, spent=transactions.filter(t=>t.dept===k&&t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
    const total=b.total||0, pct=total?Math.min(100,spent/total*100).toFixed(1):0, cats=b.categories||[];
    html+=`<div class="budget-section">
      <div class="budget-dept-header" style="color:${v.color}">${v.icon} ${v.label}</div>
      <div class="budget-total-row">
        <span>총 예산</span>
        <input class="budget-input" type="number" value="${total}" inputmode="numeric" data-action="budgetfield" data-dept="${k}" data-field="total">원
      </div>
      <div class="budget-bar-wrap">
        <div class="budget-bar" style="--pct:${pct}%;--color:${v.color}"></div>
        <span class="budget-pct">${pct}% 사용 (${fmt(spent)} / ${fmt(total)})</span>
      </div>
      <div class="budget-cats">
        ${cats.map((c,i)=>`<div class="budget-cat-row">
          <input class="budget-cat-name" value="${c.name||''}" placeholder="항목명" data-action="budgetcat" data-dept="${k}" data-idx="${i}" data-field="name">
          <input class="budget-input sm" type="number" value="${c.amount||0}" inputmode="numeric" data-action="budgetcat" data-dept="${k}" data-idx="${i}" data-field="amount">원
          <button class="cat-del" data-action="delcat" data-dept="${k}" data-idx="${i}">✕</button>
        </div>`).join('')}
      </div>
      <button class="add-cat-btn" data-action="addcat" data-dept="${k}">+ 항목 추가</button>
    </div>`;
  }
  document.getElementById('view-content').innerHTML = `<div class="budget-page">${html}<button class="save-budget-btn" data-action="savebudget">💾 예산 저장</button></div>`;
}

function renderReports() {
  const now=new Date(), year=now.getFullYear(), month=now.getMonth();
  let mHtml='';
  for (let m=0;m<12;m++) {
    const mTx=transactions.filter(t=>{ const d=t.date?.toDate?t.date.toDate():new Date(); return d.getFullYear()===year&&d.getMonth()===m&&(currentDept==='all'||t.dept===currentDept); });
    if(!mTx.length) continue;
    const s=calcSummary(mTx);
    mHtml+=`<div class="report-row ${m===month?'current-month':''}">
      <span class="report-month">${m+1}월</span>
      <span class="inc">+${fmt(s.income)}</span>
      <span class="exp">-${fmt(s.expense)}</span>
      <span class="bal ${s.balance<0?'neg':''}">${fmt(s.balance)}</span>
    </div>`;
  }
  const cats={};
  getFiltered().filter(t=>t.type==='expense').forEach(t=>{ cats[t.category||'기타']=(cats[t.category||'기타']||0)+(t.amount||0); });
  const catHtml=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<div class="cat-report-row"><span>${c}</span><span class="exp">${fmt(a)}</span></div>`).join('')||'<div class="empty">데이터 없음</div>';
  document.getElementById('view-content').innerHTML=`<div class="reports-page">
    <div class="section-title">${year}년 월별 현황</div>
    <div class="report-header-row"><span></span><span>수입</span><span>지출</span><span>잔액</span></div>
    ${mHtml||'<div class="empty">데이터 없음</div>'}
    <div class="section-title" style="margin-top:24px">지출 항목별</div>
    ${catHtml}
    <button class="print-btn" data-action="print">🖨️ 결산서 인쇄 / PDF</button>
  </div>`;
}

/* ── 모달 ── */
function showModal(html) { document.getElementById('modal-body').innerHTML=html; document.getElementById('modal').classList.add('open'); _txType='income'; }
function hideModal()     { document.getElementById('modal').classList.remove('open'); }

function showAddTxModal() {
  const today=new Date().toISOString().split('T')[0];
  const deptOpts=Object.entries(DEPTS).map(([k,v])=>`<option value="${k}" ${currentDept===k?'selected':''}>${v.icon} ${v.label}</option>`).join('');
  const catOpts=['헌금','특별헌금','행사비','식비','교재비','교통비','기타'].map(c=>`<option value="${c}">${c}</option>`).join('');
  showModal(`
    <h3 class="modal-title">거래 추가</h3>
    <div class="form-group"><label>구분</label>
      <div class="type-toggle">
        <button class="type-btn active" data-action="settype" data-t="income">수입</button>
        <button class="type-btn"        data-action="settype" data-t="expense">지출</button>
      </div>
    </div>
    <div class="form-group"><label>부서</label><select id="f-dept">${deptOpts}</select></div>
    <div class="form-group"><label>날짜</label><input type="date" id="f-date" value="${today}"></div>
    <div class="form-group"><label>금액</label><input type="number" id="f-amount" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label>항목</label><select id="f-cat">${catOpts}</select></div>
    <div class="form-group"><label>내용</label><input type="text" id="f-desc" placeholder="거래 내용"></div>
    <div class="form-group"><label>비고</label><input type="text" id="f-note" placeholder="선택사항"></div>
    <button class="modal-submit" data-action="submittx">추가</button>`);
}

function showTxDetail(id) {
  const t=transactions.find(x=>x.id===id); if(!t) return;
  const info=DEPTS[t.dept], isInc=t.type==='income';
  showModal(`
    <h3 class="modal-title">거래 상세</h3>
    <div class="detail-grid">
      <div class="detail-row"><span>구분</span><span class="${isInc?'inc':'exp'}">${isInc?'수입':'지출'}</span></div>
      <div class="detail-row"><span>부서</span><span>${info?.icon} ${info?.label}</span></div>
      <div class="detail-row"><span>날짜</span><span>${fmtDF(t.date)}</span></div>
      <div class="detail-row"><span>금액</span><span class="${isInc?'inc':'exp'} big">${isInc?'+':'-'}${fmt(t.amount)}</span></div>
      <div class="detail-row"><span>항목</span><span>${t.category||'-'}</span></div>
      <div class="detail-row"><span>내용</span><span>${t.description}</span></div>
      ${t.note?`<div class="detail-row"><span>비고</span><span>${t.note}</span></div>`:''}
    </div>
    <button class="modal-delete" data-action="txdel" data-id="${t.id}">🗑️ 삭제</button>`);
}

async function submitTx() {
  const amount=parseInt(document.getElementById('f-amount').value);
  const desc=document.getElementById('f-desc').value.trim();
  if(!amount||isNaN(amount)){showToast('금액을 입력해주세요');return;}
  if(!desc){showToast('내용을 입력해주세요');return;}
  try {
    await addTx({ type:_txType, dept:document.getElementById('f-dept').value, date:document.getElementById('f-date').value, amount, category:document.getElementById('f-cat').value, description:desc, note:document.getElementById('f-note').value });
    hideModal(); showToast('거래가 추가되었습니다 ✓');
  } catch(e){ showToast('오류: '+e.message); }
}

function printReport() {
  const filtered=getFiltered(), s=calcSummary(filtered);
  const label=currentDept==='all'?'전체':DEPTS[currentDept]?.label;
  const now=new Date(), ym=`${now.getFullYear()}년 ${now.getMonth()+1}월`;
  const rows=filtered.map(t=>`<tr><td>${fmtDF(t.date)}</td><td>${DEPTS[t.dept]?.label}</td><td>${t.category||'-'}</td><td>${t.description}</td><td style="color:#2d7a2d">${t.type==='income'?fmt(t.amount):''}</td><td style="color:#c0392b">${t.type==='expense'?fmt(t.amount):''}</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${label} 결산서</title>
  <style>body{font-family:'Malgun Gothic',sans-serif;padding:40px}h1{text-align:center;font-size:22px;margin-bottom:4px}.sub{text-align:center;color:#666;margin-bottom:24px}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#1a2744;color:#fff;padding:8px}td{border-bottom:1px solid #e0e0e0;padding:7px}tr:nth-child(even)td{background:#f8f8f8}.sum{margin-top:24px;display:flex;gap:16px;justify-content:flex-end}.sb{border:2px solid #1a2744;padding:12px 20px;border-radius:8px;text-align:right}.sl{font-size:12px;color:#666}.sv{font-size:18px;font-weight:700}@media print{button{display:none}}</style></head><body>
  <h1>📋 결산서</h1><div class="sub">${label} · ${ym}</div>
  <table><thead><tr><th>날짜</th><th>부서</th><th>항목</th><th>내용</th><th>수입</th><th>지출</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="sum">
    <div class="sb"><div class="sl">총 수입</div><div class="sv" style="color:#2d7a2d">${fmt(s.income)}</div></div>
    <div class="sb"><div class="sl">총 지출</div><div class="sv" style="color:#c0392b">${fmt(s.expense)}</div></div>
    <div class="sb"><div class="sl">잔액</div><div class="sv">${fmt(s.balance)}</div></div>
  </div><br><button onclick="window.print()">🖨️ 인쇄 / PDF</button>
  </body></html>`);
  win.document.close();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── 인증 ── */
async function doLogin() {
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!pw){showAuthError('이메일과 비밀번호를 입력해주세요.');return;}
  try { await signInWithEmailAndPassword(auth,email,pw); }
  catch(e){ showAuthError('이메일 또는 비밀번호가 올바르지 않습니다.'); }
}
async function doRegister() {
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!pw){showAuthError('이메일과 비밀번호를 입력해주세요.');return;}
  if(pw.length<6){showAuthError('비밀번호는 6자 이상이어야 합니다.');return;}
  try { await createUserWithEmailAndPassword(auth,email,pw); }
  catch(e){ showAuthError('오류: '+e.message); }
}
function showAuthError(msg){ document.getElementById('auth-error').textContent=msg; }

/* ── 이벤트 위임 (단일 핸들러) ── */
document.addEventListener('click', async e => {
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const {action,dept,view,id,t,field,idx}=btn.dataset;

  if      (action==='switchdept') { currentDept=dept; renderAll(); }
  else if (action==='moretx')     { currentView='transactions'; renderAll(); }
  else if (action==='txdetail')   { showTxDetail(id); }
  else if (action==='txdel')      { e.stopPropagation(); await deleteTx(id); }
  else if (action==='submittx')   { await submitTx(); }
  else if (action==='settype')    {
    _txType=t;
    document.querySelectorAll('[data-action="settype"]').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  }
  else if (action==='addcat') {
    if(!budgets[dept]) budgets[dept]={categories:[]};
    if(!budgets[dept].categories) budgets[dept].categories=[];
    budgets[dept].categories.push({name:'',amount:0});
    renderBudget();
  }
  else if (action==='delcat') {
    budgets[dept]?.categories?.splice(Number(idx),1);
    renderBudget();
  }
  else if (action==='savebudget') {
    document.querySelectorAll('[data-action="budgetfield"]').forEach(inp=>{
      if(!budgets[inp.dataset.dept]) budgets[inp.dataset.dept]={};
      budgets[inp.dataset.dept][inp.dataset.field]=Number(inp.value);
    });
    document.querySelectorAll('[data-action="budgetcat"]').forEach(inp=>{
      const {dept:d,idx:i,field:f}=inp.dataset;
      if(!budgets[d]?.categories?.[i]) return;
      budgets[d].categories[i][f]=f==='amount'?Number(inp.value):inp.value;
    });
    await saveBudgets({...budgets});
  }
  else if (action==='print') { printReport(); }
});

/* 모달 오버레이 닫기 */
document.getElementById('modal').addEventListener('click', e => {
  if(e.target===document.getElementById('modal')) hideModal();
});

/* 고정 버튼 바인딩 */
document.getElementById('btn-login')   .addEventListener('click', doLogin);
document.getElementById('btn-register').addEventListener('click', doRegister);
document.getElementById('btn-logout')  .addEventListener('click', ()=>{ if(confirm('로그아웃 하시겠습니까?')) signOut(auth); });
document.getElementById('login-pw')    .addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('btn-fab')     .addEventListener('click', showAddTxModal);

document.querySelectorAll('.dept-tab').forEach(btn=>btn.addEventListener('click',()=>{ currentDept=btn.dataset.dept; renderAll(); }));
document.querySelectorAll('.nav-btn') .forEach(btn=>btn.addEventListener('click',()=>{ currentView=btn.dataset.view; renderAll(); }));
</script>
</body>
</html>
